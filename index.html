<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#ffdad6",
                    "primary-fixed-dim": "#c1c8ca",
                    "on-secondary-fixed-variant": "#004881",
                    "surface-container-high": "#e7e8ec",
                    "on-tertiary-container": "#ff6b63",
                    "primary-container": "#2d3436",
                    "on-background": "#191c1f",
                    "on-tertiary-fixed-variant": "#930011",
                    "on-secondary-container": "#00345f",
                    "tertiary-fixed-dim": "#ffb3ad",
                    "secondary": "#0060a9",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#f8f9fd",
                    "secondary-container": "#3f9eff",
                    "inverse-primary": "#c1c8ca",
                    "error-container": "#ffdad6",
                    "surface-tint": "#586062",
                    "surface-container-highest": "#e1e2e6",
                    "outline": "#747879",
                    "surface-container": "#edeef2",
                    "secondary-fixed": "#d3e4ff",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#2e3134",
                    "on-surface": "#191c1f",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "primary": "#181f21",
                    "tertiary": "#450004",
                    "secondary-fixed-dim": "#a2c9ff",
                    "on-tertiary-fixed": "#410003",
                    "surface-variant": "#e1e2e6",
                    "primary-fixed": "#dde4e6",
                    "on-error": "#ffffff",
                    "on-primary-container": "#959c9f",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#eff1f5",
                    "background": "#f8f9fd",
                    "on-secondary-fixed": "#001c38",
                    "on-surface-variant": "#434749",
                    "outline-variant": "#c3c7c8",
                    "on-primary-fixed-variant": "#41484a",
                    "on-primary-fixed": "#161d1f",
                    "on-error-container": "#93000a",
                    "surface": "#f8f9fd",
                    "tertiary-container": "#6d0009",
                    "surface-dim": "#d9dade",
                    "surface-container-low": "#f2f3f7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-lg": "3rem",
                    "grid-gap": "1rem",
                    "stack-sm": "0.5rem",
                    "container-padding": "2rem",
                    "stack-md": "1.5rem"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "display-game": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "display-game": ["84px", {"lineHeight": "84px", "letterSpacing": "-0.05em", "fontWeight": "300"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-padding">
<main class="w-full max-w-md flex flex-col items-center gap-10">
        <div class="w-full bg-surface-container-high rounded-xl p-6 border border-primary/5 shadow-sm">
                <div class="grid grid-cols-3 gap-4">
                        <div class="text-center">
                                <p class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-[0.2em] mb-1">Player X</p>
                                <p class="font-headline-lg text-headline-lg leading-none text-primary" id="score-x">12</p>
                        </div>
                        <div class="text-center border-x border-primary/10">
                                <p class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-[0.2em] mb-1">Draws</p>
                                <p class="font-headline-lg text-headline-lg leading-none opacity-40" id="score-draw">3</p>
                        </div>
                        <div class="text-center">
                                <p class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-[0.2em] mb-1">Player O</p>
                                <p class="font-headline-lg text-headline-lg leading-none text-primary" id="score-o">8</p>
                        </div>
                </div>
        </div>

        <div class="w-full flex flex-col items-center">
                <div class="mb-6 flex items-center gap-2">
                        <span class="font-label-caps text-label-caps text-on-surface-variant opacity-60" id="turn-display">PLAYER X'S TURN</span>
                </div>
                <div id="board-container" class="grid grid-cols-3 gap-grid-gap w-full bg-surface-container-low p-4 rounded-xl shadow-sm border border-primary/5">
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="0">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="1">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="2">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="3">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="4">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="5">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="6">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="7">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                        <div class="game-cell bg-surface hover:bg-surface-bright flex items-center justify-center rounded-lg cursor-pointer border border-primary/10 shadow-sm overflow-hidden group" data-cell="8">
                                <span class="mark hidden font-display-game text-display-game text-primary mark-animate select-none"></span>
                        </div>
                </div>
                <button class="mt-8 text-on-surface-variant hover:text-primary font-label-caps text-[10px] tracking-widest transition-colors" id="reset-btn">Reset Board</button>
        </div>
</main>
<!-- Result Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-background/40 backdrop-blur-md hidden transition-all duration-500" id="game-over-overlay">
        <div class="bg-surface p-10 rounded-2xl shadow-2xl border border-primary/5 text-center max-w-xs w-full mx-4 transform scale-90 transition-transform duration-300" id="overlay-card">
                <h3 class="font-headline-lg text-headline-lg text-primary mb-2" id="result-title">Victory!</h3>
                <p class="font-body-md text-on-surface-variant mb-8" id="result-subtitle">Player X has achieved enlightenment.</p>
                <button class="w-full bg-primary text-on-primary font-label-caps text-label-caps py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-95 transition-all" id="play-again-btn">PLAY AGAIN</button>
        </div>
</div>
<script src="assets/js/script.js"></script>
</body>
</html>
